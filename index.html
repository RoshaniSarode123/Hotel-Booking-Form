<!DOCTYPE html>
<html>
<head>
<title>Royal Hotel Booking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Royal Palace Hotel</h1>
<p>Enjoy Luxury & Comfort</p>
</header>

<section class="hero">
<h2>Welcome to Our Hotel</h2>
<p>Book your perfect stay with us</p>
</section>

<section class="booking">

<h2>Hotel Booking Form</h2>

<form id="bookingForm">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<label>Check In Date</label>
<input type="date" required>

<label>Check Out Date</label>
<input type="date" required>

<select>
<option>Select Room</option>
<option>Single Room</option>
<option>Double Room</option>
<option>Luxury Suite</option>
</select>

<input type="number" placeholder="Number of Guests" min="1" max="5">

<button type="submit">Book Now</button>

<p id="msg"></p>

</form>

</section>

<section class="services">

<div class="service">
<h3>🏨 Luxury Rooms</h3>
<p>Modern and comfortable rooms</p>
</div>

<div class="service">
<h3>🍽 Restaurant</h3>
<p>Delicious food available</p>
</div>

<div class="service">
<h3>🏊 Swimming Pool</h3>
<p>Relax in our beautiful pool</p>
</div>

</section>

<footer>
<p>© 2026 Royal Palace Hotel</p>
</footer>

<script src="script.js"></script>

</body>
</html>
